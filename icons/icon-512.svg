<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="64" fill="#05080f"/>
  <!-- Stair steps -->
  <g stroke="#00ffc3" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="96,416 96,320 192,320 192,224 288,224 288,128 384,128 384,96"/>
  </g>
  <!-- Eye / vision symbol -->
  <g transform="translate(256,256)" fill="none" stroke="#00ffc3" stroke-width="6">
    <ellipse rx="80" ry="48" opacity="0.6"/>
    <circle r="24" fill="#00ffc3" opacity="0.8"/>
  </g>
  <!-- Detection line -->
  <line x1="64" y1="346" x2="448" y2="346" stroke="#00ffc3" stroke-width="4" stroke-dasharray="16,10" opacity="0.5"/>
</svg>
